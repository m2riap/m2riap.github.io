<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Y2K Sunset Ocean</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

.title{
    position:absolute;
    top:35px;
    width:100%;
    text-align:center;
    color:white;
    font-size:2rem;
    letter-spacing:14px;
    font-weight:300;
    text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 30px rgba(255,120,255,0.6),
    0 0 60px rgba(100,180,255,0.5);
    pointer-events:none;
}

.overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
    linear-gradient(to bottom,
    rgba(255,255,255,0.04),
    rgba(255,255,255,0.01),
    rgba(0,0,0,0.12));
}

.scanlines{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:0.05;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.15) 0px,
        rgba(255,255,255,0.15) 1px,
        transparent 2px,
        transparent 4px
    );
}
</style>
</head>

<body>

<div class="title">Y2K SUNSET</div>
<div class="overlay"></div>
<div class="scanlines"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;
let time = 0;

const clouds = [];
const sparkles = [];

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

    createClouds();
}

window.addEventListener("resize", resize);

class Cloud{

    constructor(x,y,size,speed,opacity){

        this.x = x;
        this.y = y;
        this.size = size;
        this.speed = speed;
        this.opacity = opacity;

        this.puffs = [];

        // bigger fluffier cloud groups
        for(let i=0;i<18;i++){

            this.puffs.push({
                x:(Math.random()-0.5)*this.size*2,
                y:(Math.random()-0.5)*this.size*0.6,
                r:this.size*(0.35 + Math.random()*0.35)
            });
        }
    }

    draw(){

        ctx.save();
        ctx.translate(this.x,this.y);

        ctx.globalAlpha = this.opacity;

        this.puffs.forEach(p=>{

            const grad = ctx.createRadialGradient(
                p.x,p.y,0,
                p.x,p.y,p.r
            );

            // sharper y2k glossy clouds
            grad.addColorStop(0,"rgba(255,255,255,1)");
            grad.addColorStop(0.4,"rgba(255,240,255,0.95)");
            grad.addColorStop(0.7,"rgba(255,180,255,0.4)");
            grad.addColorStop(1,"rgba(255,160,255,0)");

            ctx.fillStyle = grad;

            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fill();
        });

        ctx.restore();

        this.x += this.speed;

        if(this.x - this.size > w + 400){
            this.x = -400;
        }
    }
}

function createClouds(){

    clouds.length = 0;

    // fewer larger clouds
    for(let i=0;i<5;i++){

        clouds.push(
            new Cloud(
                Math.random()*w,
                50 + Math.random()*h*0.25,
                130 + Math.random()*110,
                0.02 + Math.random()*0.03,
                0.18 + Math.random()*0.08
            )
        );
    }
}

class Sparkle{

    constructor(x,y){

        this.x = x;
        this.y = y;

        this.vx = (Math.random()-0.5)*2;
        this.vy = (Math.random()-0.5)*2;

        this.life = 1;

        this.size = 1 + Math.random()*4;

        this.hue = 280 + Math.random()*80;
    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.life -= 0.02;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha = this.life;

        ctx.shadowBlur = 25;
        ctx.shadowColor =
        `hsla(${this.hue},100%,70%,1)`;

        ctx.fillStyle =
        `hsla(${this.hue},100%,75%,1)`;

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

window.addEventListener("mousemove",(e)=>{

    for(let i=0;i<6;i++){

        sparkles.push(
            new Sparkle(
                e.clientX + (Math.random()-0.5)*20,
                e.clientY + (Math.random()-0.5)*20
            )
        );
    }
});

function drawSky(){

    // bright y2k pink/blue gradient
    const sky = ctx.createLinearGradient(0,0,0,h);

    sky.addColorStop(0,"#243BFF");
    sky.addColorStop(0.18,"#4E6BFF");
    sky.addColorStop(0.4,"#FF61D8");
    sky.addColorStop(0.62,"#FF8BCB");
    sky.addColorStop(0.82,"#7EE7FF");
    sky.addColorStop(1,"#FFE2FF");

    ctx.fillStyle = sky;
    ctx.fillRect(0,0,w,h);
}

function drawSun(){

    const x = w/2;
    const y = h*0.55;

    const glow = ctx.createRadialGradient(
        x,y,60,
        x,y,300
    );

    glow.addColorStop(0,
        "rgba(255,255,255,1)");

    glow.addColorStop(0.2,
        "rgba(255,220,255,0.95)");

    glow.addColorStop(0.45,
        "rgba(255,120,220,0.6)");

    glow.addColorStop(1,
        "rgba(255,120,220,0)");

    ctx.fillStyle = glow;

    ctx.beginPath();
    ctx.arc(x,y,300,0,Math.PI*2);
    ctx.fill();

    // glowing y2k sun
    ctx.beginPath();
    ctx.fillStyle = "#fff8ff";
    ctx.arc(x,y,75,0,Math.PI*2);
    ctx.fill();
}

function drawSea(){

    const horizon = h*0.55;

    // vivid ocean tones
    const sea = ctx.createLinearGradient(
        0,horizon,
        0,h
    );

    sea.addColorStop(0,"#FF7EDB");
    sea.addColorStop(0.15,"#56C6FF");
    sea.addColorStop(0.45,"#2E59C9");
    sea.addColorStop(1,"#081A44");

    ctx.fillStyle = sea;
    ctx.fillRect(0,horizon,w,h);

    // realistic layered waves
    for(let y=horizon; y<h; y+=2){

        ctx.beginPath();

        for(let x=0; x<w; x+=5){

            const wave =
                y +

                // large waves
                Math.sin(x*0.012 + time*1.8 + y*0.01)*6 +

                // medium waves
                Math.sin(x*0.03 + time*3)*3 +

                // tiny ripples
                Math.sin(x*0.08 + time*5)*1.2;

            if(x===0){
                ctx.moveTo(x,wave);
            }else{
                ctx.lineTo(x,wave);
            }
        }

        const alpha =
            0.03 + ((y-horizon)/h)*0.06;

        ctx.strokeStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.stroke();
    }

    // bright reflection
    const reflection = ctx.createLinearGradient(
        w/2,horizon,
        w/2,h
    );

    reflection.addColorStop(0,
        "rgba(255,210,255,0.9)");

    reflection.addColorStop(1,
        "rgba(255,210,255,0)");

    ctx.fillStyle = reflection;

    ctx.beginPath();

    ctx.moveTo(w/2 - 60,horizon);
    ctx.lineTo(w/2 + 60,horizon);

    ctx.lineTo(w/2 + 300,h);
    ctx.lineTo(w/2 - 300,h);

    ctx.closePath();
    ctx.fill();
}

function drawAtmosphere(){

    const haze = ctx.createLinearGradient(
        0,h*0.45,
        0,h
    );

    haze.addColorStop(0,
        "rgba(255,150,255,0)");

    haze.addColorStop(1,
        "rgba(255,120,255,0.08)");

    ctx.fillStyle = haze;
    ctx.fillRect(0,0,w,h);
}

function animate(){

    requestAnimationFrame(animate);

    time += 0.004;

    drawSky();
    drawSun();

    clouds.forEach(cloud=>{
        cloud.draw();
    });

    drawSea();
    drawAtmosphere();

    // sparkles
    for(let i=sparkles.length-1;i>=0;i--){

        sparkles[i].update();
        sparkles[i].draw();

        if(sparkles[i].life <= 0){
            sparkles.splice(i,1);
        }
    }

    // glossy y2k glow
    ctx.fillStyle =
    "rgba(255,180,255,0.03)";
    ctx.fillRect(0,0,w,h);
}

resize();
animate();

</script>

</body>
</html>
