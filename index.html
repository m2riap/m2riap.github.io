<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Realistic Sunset Sea</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html,body{
        width:100%;
        height:100%;
        overflow:hidden;
        background:#000;
        font-family:Arial,sans-serif;
    }

    canvas{
        display:block;
    }

    .vignette{
        position:absolute;
        inset:0;
        pointer-events:none;
        background:
        radial-gradient(circle at center,
        transparent 45%,
        rgba(0,0,0,0.35) 100%);
        mix-blend-mode:multiply;
    }

    .grain{
        position:absolute;
        inset:0;
        opacity:0.035;
        pointer-events:none;
        background-image:
        repeating-radial-gradient(circle at 0 0,
        transparent 0,
        #fff 1px,
        transparent 2px);
    }

    .title{
        position:absolute;
        top:35px;
        width:100%;
        text-align:center;
        color:rgba(255,255,255,0.92);
        font-size:2rem;
        letter-spacing:10px;
        font-weight:300;
        text-shadow:
        0 0 15px rgba(255,255,255,0.35),
        0 0 40px rgba(255,180,100,0.25);
        pointer-events:none;
    }
</style>
</head>

<body>

<div class="title">SUNSET SEA</div>
<div class="grain"></div>
<div class="vignette"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;
let time = 0;

const clouds = [];
const sparkles = [];

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

    createClouds();
}

window.addEventListener("resize", resize);

class Cloud{
    constructor(x,y,size,speed,opacity){
        this.x = x;
        this.y = y;
        this.size = size;
        this.speed = speed;
        this.opacity = opacity;

        // fixed puff positions (prevents shaking)
        this.puffs = [];

        for(let i=0;i<10;i++){
            this.puffs.push({
                x:(Math.random()-0.5)*this.size*1.6,
                y:(Math.random()-0.5)*this.size*0.45,
                r:this.size*(0.35 + Math.random()*0.22)
            });
        }
    }

    draw(){

        ctx.save();
        ctx.translate(this.x,this.y);
        ctx.globalAlpha = this.opacity;

        this.puffs.forEach(p=>{

            const grad = ctx.createRadialGradient(
                p.x,
                p.y,
                0,
                p.x,
                p.y,
                p.r
            );

            grad.addColorStop(0,"rgba(255,255,255,0.95)");
            grad.addColorStop(0.45,"rgba(255,235,225,0.7)");
            grad.addColorStop(1,"rgba(255,190,140,0)");

            ctx.fillStyle = grad;

            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fill();
        });

        ctx.restore();

        this.x += this.speed;

        if(this.x - this.size > w + 100){
            this.x = -200;
        }
    }
}

function createClouds(){

    clouds.length = 0;

    for(let i=0;i<18;i++){

        clouds.push(
            new Cloud(
                Math.random()*w,
                Math.random()*h*0.42,
                35 + Math.random()*45, // smaller clouds
                0.03 + Math.random()*0.05,
                0.10 + Math.random()*0.12
            )
        );
    }
}

class Sparkle{
    constructor(x,y){
        this.x = x;
        this.y = y;

        this.vx = (Math.random()-0.5)*2;
        this.vy = (Math.random()-0.5)*2;

        this.life = 1;
        this.size = 1 + Math.random()*3;

        this.hue = 40 + Math.random()*25;
    }

    update(){
        this.x += this.vx;
        this.y += this.vy;

        this.life -= 0.02;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha = this.life;

        ctx.shadowBlur = 20;
        ctx.shadowColor = `hsla(${this.hue},100%,70%,1)`;

        ctx.fillStyle = `hsla(${this.hue},100%,75%,1)`;

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

window.addEventListener("mousemove",(e)=>{

    for(let i=0;i<5;i++){

        sparkles.push(
            new Sparkle(
                e.clientX + (Math.random()-0.5)*20,
                e.clientY + (Math.random()-0.5)*20
            )
        );
    }
});

function drawSky(){

    const sky = ctx.createLinearGradient(0,0,0,h);

    sky.addColorStop(0,"#081321");
    sky.addColorStop(0.2,"#223b6d");
    sky.addColorStop(0.48,"#ff9262");
    sky.addColorStop(0.72,"#ffc18d");
    sky.addColorStop(1,"#ffe4c3");

    ctx.fillStyle = sky;
    ctx.fillRect(0,0,w,h);
}

function drawSun(){

    const x = w/2;
    const y = h*0.58;

    const glow = ctx.createRadialGradient(
        x,y,40,
        x,y,260
    );

    glow.addColorStop(0,"rgba(255,250,220,1)");
    glow.addColorStop(0.2,"rgba(255,220,160,0.95)");
    glow.addColorStop(0.45,"rgba(255,160,90,0.4)");
    glow.addColorStop(1,"rgba(255,120,50,0)");

    ctx.fillStyle = glow;

    ctx.beginPath();
    ctx.arc(x,y,260,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.fillStyle = "#fff6d4";
    ctx.arc(x,y,58,0,Math.PI*2);
    ctx.fill();
}

function drawSea(){

    const horizon = h*0.58;

    const sea = ctx.createLinearGradient(
        0,horizon,
        0,h
    );

    sea.addColorStop(0,"#ff9966");
    sea.addColorStop(0.15,"#2c6a89");
    sea.addColorStop(0.45,"#14374b");
    sea.addColorStop(1,"#07131b");

    ctx.fillStyle = sea;
    ctx.fillRect(0,horizon,w,h);

    // small realistic waves
    for(let y=horizon; y<h; y+=2){

        ctx.beginPath();

        for(let x=0; x<w; x+=8){

            const wave =
                y +
                Math.sin(x*0.022 + time*2.2 + y*0.02)*2 +
                Math.sin(x*0.008 + time*1.3)*1.5;

            if(x===0){
                ctx.moveTo(x,wave);
            }else{
                ctx.lineTo(x,wave);
            }
        }

        const alpha =
            0.015 + ((y-horizon)/h)*0.04;

        ctx.strokeStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.stroke();
    }

    // sun reflection
    const reflection = ctx.createLinearGradient(
        w/2,horizon,
        w/2,h
    );

    reflection.addColorStop(0,
        "rgba(255,235,180,0.6)");

    reflection.addColorStop(1,
        "rgba(255,235,180,0)");

    ctx.fillStyle = reflection;

    ctx.beginPath();

    ctx.moveTo(w/2 - 35,horizon);
    ctx.lineTo(w/2 + 35,horizon);

    ctx.lineTo(w/2 + 220,h);
    ctx.lineTo(w/2 - 220,h);

    ctx.closePath();
    ctx.fill();
}

function drawAtmosphere(){

    const haze = ctx.createLinearGradient(
        0,h*0.45,
        0,h
    );

    haze.addColorStop(0,
        "rgba(255,180,120,0)");

    haze.addColorStop(1,
        "rgba(255,160,120,0.12)");

    ctx.fillStyle = haze;
    ctx.fillRect(0,0,w,h);
}

function animate(){

    requestAnimationFrame(animate);

    time += 0.003;

    drawSky();
    drawSun();

    clouds.forEach(c=>c.draw());

    drawSea();

    drawAtmosphere();

    for(let i=sparkles.length-1;i>=0;i--){

        sparkles[i].update();
        sparkles[i].draw();

        if(sparkles[i].life<=0){
            sparkles.splice(i,1);
        }
    }

    // cinematic warmth overlay
    ctx.fillStyle = "rgba(255,120,60,0.02)";
    ctx.fillRect(0,0,w,h);
}

resize();
animate();

</script>

</body>
</html>
