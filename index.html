<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fantasy Dolphin Ocean</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#00111f;
    cursor:crosshair;
    font-family:Arial, sans-serif;
}

body{
    position:relative;
}

/* =========================
   MAIN SCENE
========================= */

#scene{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;

    /* OCEAN SKY BACKGROUND */
    background:
        radial-gradient(circle at top, rgba(255,255,255,0.3), transparent 40%),
        linear-gradient(to bottom,
            #4dd7ff 0%,
            #14a8ff 25%,
            #0077c8 55%,
            #003e7a 100%);
}

/* =========================
   CLOUDS
========================= */

.cloud{
    position:absolute;
    background:rgba(255,255,255,0.95);
    border-radius:100px;
    filter:blur(1px);
    opacity:0.9;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud1{
    width:180px;
    height:60px;
    top:10%;
    left:8%;
    animation:cloudMove 45s linear infinite;
}

.cloud1::before{
    width:80px;
    height:80px;
    left:20px;
    top:-35px;
}

.cloud1::after{
    width:100px;
    height:100px;
    right:20px;
    top:-45px;
}

.cloud2{
    width:220px;
    height:70px;
    top:18%;
    left:65%;
    animation:cloudMove 60s linear infinite reverse;
}

.cloud2::before{
    width:90px;
    height:90px;
    left:35px;
    top:-35px;
}

.cloud2::after{
    width:120px;
    height:120px;
    right:20px;
    top:-55px;
}

@keyframes cloudMove{
    from{
        transform:translateX(-100px);
    }
    to{
        transform:translateX(150px);
    }
}

/* =========================
   RAINBOW
========================= */

.rainbow{
    position:absolute;
    width:1200px;
    height:600px;
    left:50%;
    top:-200px;
    transform:translateX(-50%);
    border-radius:50%;
    pointer-events:none;
    opacity:0.85;

    background:
        radial-gradient(circle at center,
            transparent 57%,
            red 58%,
            orange 61%,
            yellow 64%,
            lime 67%,
            cyan 70%,
            blue 73%,
            violet 76%,
            transparent 77%);
}

/* =========================
   OCEAN
========================= */

.ocean{
    position:absolute;
    bottom:0;
    width:100%;
    height:45%;
    background:
        linear-gradient(to bottom,
            rgba(255,255,255,0.15),
            rgba(255,255,255,0)),
        linear-gradient(to bottom,
            #0094ff,
            #003e7a 70%,
            #00192d);

    overflow:hidden;
}

/* WATER SHIMMER */
.ocean::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        repeating-linear-gradient(
            -8deg,
            rgba(255,255,255,0.15) 0px,
            rgba(255,255,255,0.05) 2px,
            transparent 4px,
            transparent 18px
        );

    opacity:0.3;
    animation:waterFlow 6s linear infinite;
}

@keyframes waterFlow{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(120px);
    }
}

/* =========================
   DOLPHINS
========================= */

.dolphin{
    position:absolute;
    width:260px;
    z-index:5;
    pointer-events:none;

    filter:
        drop-shadow(0 0 15px rgba(255,255,255,0.6))
        drop-shadow(0 0 35px rgba(0,255,255,0.4));
}

/* MAIN HERO DOLPHIN */
.d1{
    animation:jump1 9s ease-in-out infinite;
}

/* LEFT DOLPHIN */
.d2{
    width:200px;
    animation:jump2 11s ease-in-out infinite;
    animation-delay:-3s;
}

/* RIGHT DOLPHIN */
.d3{
    width:170px;
    animation:jump3 12s ease-in-out infinite;
    animation-delay:-5s;
}

/* SMALL FAR DOLPHINS */
.d4{
    width:120px;
    opacity:0.8;
    animation:jump4 14s ease-in-out infinite;
    animation-delay:-2s;
}

.d5{
    width:100px;
    opacity:0.7;
    animation:jump5 16s ease-in-out infinite;
    animation-delay:-8s;
}

/* =========================
   DOLPHIN JUMP ANIMATIONS
========================= */

@keyframes jump1{

    0%{
        transform:
            translate(-300px, 500px)
            rotate(20deg)
            scale(0.8);
    }

    35%{
        transform:
            translate(35vw, 30px)
            rotate(-35deg)
            scale(1.05);
    }

    55%{
        transform:
            translate(52vw, -120px)
            rotate(-55deg)
            scale(1.1);
    }

    100%{
        transform:
            translate(120vw, 500px)
            rotate(20deg)
            scale(0.8);
    }
}

@keyframes jump2{

    0%{
        transform:
            translate(-250px, 550px)
            rotate(20deg);
    }

    40%{
        transform:
            translate(25vw, 180px)
            rotate(-25deg)
            scale(1.05);
    }

    100%{
        transform:
            translate(120vw, 600px)
            rotate(15deg);
    }
}

@keyframes jump3{

    0%{
        transform:
            translate(120vw, 450px)
            rotate(-20deg);
    }

    40%{
        transform:
            translate(70vw, 120px)
            rotate(30deg)
            scale(1.05);
    }

    100%{
        transform:
            translate(-300px, 550px)
            rotate(-15deg);
    }
}

@keyframes jump4{

    0%{
        transform:
            translate(-150px, 350px)
            rotate(15deg);
    }

    50%{
        transform:
            translate(60vw, 120px)
            rotate(-35deg)
            scale(1.1);
    }

    100%{
        transform:
            translate(120vw, 380px)
            rotate(10deg);
    }
}

@keyframes jump5{

    0%{
        transform:
            translate(120vw, 300px)
            rotate(-20deg);
    }

    50%{
        transform:
            translate(40vw, 80px)
            rotate(25deg)
            scale(1.1);
    }

    100%{
        transform:
            translate(-200px, 350px)
            rotate(-15deg);
    }
}

/* =========================
   SPARKLES
========================= */

canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:20;
    pointer-events:none;
}

</style>
</head>

<body>

<div id="scene">

    <!-- RAINBOW -->
    <div class="rainbow"></div>

    <!-- CLOUDS -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <!-- DOLPHINS -->
    <img class="dolphin d1"
        src="https://pngimg.com/d/dolphin_PNG713.png">

    <img class="dolphin d2"
        src="https://pngimg.com/d/dolphin_PNG713.png">

    <img class="dolphin d3"
        src="https://pngimg.com/d/dolphin_PNG713.png">

    <img class="dolphin d4"
        src="https://pngimg.com/d/dolphin_PNG713.png">

    <img class="dolphin d5"
        src="https://pngimg.com/d/dolphin_PNG713.png">

    <!-- OCEAN -->
    <div class="ocean"></div>

    <!-- SPARKLES -->
    <canvas id="sparkleCanvas"></canvas>

</div>

<script>

/* =========================
   SPARKLE SYSTEM
========================= */

const canvas = document.getElementById("sparkleCanvas");
const ctx = canvas.getContext("2d");

let width;
let height;

function resizeCanvas(){

    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

const sparkles = [];

class Sparkle{

    constructor(x,y){

        this.x = x;
        this.y = y;

        this.size = Math.random() * 4 + 1;

        this.life = 0;
        this.maxLife = Math.random() * 60 + 40;

        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;

        this.opacity = 1;

        this.hue = 180 + Math.random() * 80;
    }

    update(){

        this.life++;

        this.x += this.vx;
        this.y += this.vy;

        this.opacity = 1 - this.life / this.maxLife;
    }

    draw(){

        ctx.save();

        ctx.translate(this.x,this.y);

        /* GLOW */
        const gradient = ctx.createRadialGradient(
            0,0,0,
            0,0,this.size * 8
        );

        gradient.addColorStop(
            0,
            `hsla(${this.hue},100%,85%,${this.opacity})`
        );

        gradient.addColorStop(
            1,
            `hsla(${this.hue},100%,85%,0)`
        );

        ctx.fillStyle = gradient;

        ctx.beginPath();
        ctx.arc(0,0,this.size * 8,0,Math.PI*2);
        ctx.fill();

        /* STAR */
        ctx.strokeStyle =
            `rgba(255,255,255,${this.opacity})`;

        ctx.lineWidth = 1.5;

        ctx.beginPath();

        ctx.moveTo(-this.size,0);
        ctx.lineTo(this.size,0);

        ctx.moveTo(0,-this.size);
        ctx.lineTo(0,this.size);

        ctx.stroke();

        ctx.restore();
    }
}

/* CREATE SPARKLES */

function createSparkles(x,y){

    for(let i=0;i<8;i++){

        sparkles.push(new Sparkle(x,y));
    }
}

/* MOUSE MOVE */

window.addEventListener("mousemove",(e)=>{

    createSparkles(e.clientX,e.clientY);
});

/* TOUCH */

window.addEventListener("touchmove",(e)=>{

    const touch = e.touches[0];

    createSparkles(touch.clientX,touch.clientY);
});

/* ANIMATION LOOP */

function animate(){

    ctx.clearRect(0,0,width,height);

    for(let i=sparkles.length-1;i>=0;i--){

        const sparkle = sparkles[i];

        sparkle.update();
        sparkle.draw();

        if(sparkle.life >= sparkle.maxLife){

            sparkles.splice(i,1);
        }
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
