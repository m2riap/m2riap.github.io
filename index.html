<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Realistic Sunset Sea</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}

.overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
    radial-gradient(circle at center,
    rgba(255,255,255,0.04),
    rgba(0,0,0,0.18));
    mix-blend-mode:screen;
}

.film{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:0.03;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.2) 0px,
        rgba(255,255,255,0.2) 1px,
        transparent 2px,
        transparent 4px
    );
}
</style>
</head>

<body>

<div class="overlay"></div>
<div class="film"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;
let time = 0;

const clouds = [];
const sparkles = [];

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

    createClouds();
}

window.addEventListener("resize", resize);

class Cloud{

    constructor(x,y,size,speed,opacity){

        this.x = x;
        this.y = y;
        this.size = size;
        this.speed = speed;
        this.opacity = opacity;

        this.parts = [];

        // detailed fluffy clouds
        for(let i=0;i<22;i++){

            this.parts.push({
                x:(Math.random()-0.5)*this.size*2.2,
                y:(Math.random()-0.5)*this.size*0.5,
                r:this.size*(0.3 + Math.random()*0.35)
            });
        }
    }

    draw(){

        ctx.save();
        ctx.translate(this.x,this.y);

        ctx.globalAlpha = this.opacity;

        this.parts.forEach(p=>{

            const grad = ctx.createRadialGradient(
                p.x,p.y,0,
                p.x,p.y,p.r
            );

            grad.addColorStop(0,
                "rgba(255,255,255,1)");

            grad.addColorStop(0.35,
                "rgba(255,245,255,0.95)");

            grad.addColorStop(0.7,
                "rgba(255,190,230,0.45)");

            grad.addColorStop(1,
                "rgba(255,180,220,0)");

            ctx.fillStyle = grad;

            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fill();
        });

        ctx.restore();

        this.x += this.speed;

        if(this.x - this.size > w + 500){
            this.x = -500;
        }
    }
}

function createClouds(){

    clouds.length = 0;

    // fewer but massive cinematic clouds
    for(let i=0;i<5;i++){

        clouds.push(
            new Cloud(
                Math.random()*w,
                50 + Math.random()*h*0.24,
                160 + Math.random()*140,
                0.015 + Math.random()*0.03,
                0.16 + Math.random()*0.07
            )
        );
    }
}

class Sparkle{

    constructor(x,y){

        this.x = x;
        this.y = y;

        this.vx = (Math.random()-0.5)*2;
        this.vy = (Math.random()-0.5)*2;

        this.life = 1;

        this.size = 1 + Math.random()*3;

        this.hue = 290 + Math.random()*60;
    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.life -= 0.02;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha = this.life;

        ctx.shadowBlur = 25;
        ctx.shadowColor =
        `hsla(${this.hue},100%,70%,1)`;

        ctx.fillStyle =
        `hsla(${this.hue},100%,75%,1)`;

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

window.addEventListener("mousemove",(e)=>{

    for(let i=0;i<6;i++){

        sparkles.push(
            new Sparkle(
                e.clientX + (Math.random()-0.5)*20,
                e.clientY + (Math.random()-0.5)*20
            )
        );
    }
});

function drawSky(){

    // high quality pink/blue y2k sunset
    const sky = ctx.createLinearGradient(0,0,0,h);

    sky.addColorStop(0,"#1731a6");
    sky.addColorStop(0.2,"#4f68ff");
    sky.addColorStop(0.42,"#ff67d7");
    sky.addColorStop(0.62,"#ff9ed6");
    sky.addColorStop(0.82,"#89d8ff");
    sky.addColorStop(1,"#fff0ff");

    ctx.fillStyle = sky;
    ctx.fillRect(0,0,w,h);

    // subtle glow layer
    const glow = ctx.createRadialGradient(
        w/2,h*0.55,50,
        w/2,h*0.55,w*0.7
    );

    glow.addColorStop(0,
        "rgba(255,180,255,0.2)");

    glow.addColorStop(1,
        "rgba(255,180,255,0)");

    ctx.fillStyle = glow;
    ctx.fillRect(0,0,w,h);
}

function drawSun(){

    const x = w/2;
    const y = h*0.56;

    // realistic glow
    const glow = ctx.createRadialGradient(
        x,y,70,
        x,y,380
    );

    glow.addColorStop(0,
        "rgba(255,255,255,1)");

    glow.addColorStop(0.18,
        "rgba(255,245,255,0.95)");

    glow.addColorStop(0.4,
        "rgba(255,180,240,0.55)");

    glow.addColorStop(1,
        "rgba(255,140,220,0)");

    ctx.fillStyle = glow;

    ctx.beginPath();
    ctx.arc(x,y,380,0,Math.PI*2);
    ctx.fill();

    // crisp sun core
    ctx.beginPath();
    ctx.fillStyle = "#fffbff";
    ctx.arc(x,y,82,0,Math.PI*2);
    ctx.fill();
}

function drawSea(){

    const horizon = h*0.56;

    // richer ocean colors
    const sea = ctx.createLinearGradient(
        0,horizon,
        0,h
    );

    sea.addColorStop(0,"#ff7fe2");
    sea.addColorStop(0.15,"#66d3ff");
    sea.addColorStop(0.42,"#2c66d1");
    sea.addColorStop(1,"#06153c");

    ctx.fillStyle = sea;
    ctx.fillRect(0,horizon,w,h);

    // detailed layered waves
    for(let y=horizon; y<h; y+=2){

        ctx.beginPath();

        for(let x=0; x<w; x+=4){

            const wave =
                y +

                // deep ocean movement
                Math.sin(x*0.009 + time*1.5 + y*0.012)*7 +

                // medium waves
                Math.sin(x*0.028 + time*2.8)*3 +

                // tiny ripples
                Math.sin(x*0.08 + time*5.5)*1.2;

            if(x===0){
                ctx.moveTo(x,wave);
            }else{
                ctx.lineTo(x,wave);
            }
        }

        const alpha =
            0.03 + ((y-horizon)/h)*0.08;

        ctx.strokeStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.stroke();
    }

    // realistic sun reflection
    const reflection = ctx.createLinearGradient(
        w/2,horizon,
        w/2,h
    );

    reflection.addColorStop(0,
        "rgba(255,220,255,0.95)");

    reflection.addColorStop(0.4,
        "rgba(255,190,255,0.35)");

    reflection.addColorStop(1,
        "rgba(255,180,255,0)");

    ctx.fillStyle = reflection;

    ctx.beginPath();

    ctx.moveTo(w/2 - 70,horizon);
    ctx.lineTo(w/2 + 70,horizon);

    ctx.lineTo(w/2 + 330,h);
    ctx.lineTo(w/2 - 330,h);

    ctx.closePath();
    ctx.fill();
}

function drawAtmosphere(){

    const haze = ctx.createLinearGradient(
        0,h*0.45,
        0,h
    );

    haze.addColorStop(0,
        "rgba(255,170,255,0)");

    haze.addColorStop(1,
        "rgba(255,120,255,0.07)");

    ctx.fillStyle = haze;
    ctx.fillRect(0,0,w,h);
}

function animate(){

    requestAnimationFrame(animate);

    time += 0.004;

    drawSky();
    drawSun();

    clouds.forEach(cloud=>{
        cloud.draw();
    });

    drawSea();

    drawAtmosphere();

    // sparkles
    for(let i=sparkles.length-1;i>=0;i--){

        sparkles[i].update();
        sparkles[i].draw();

        if(sparkles[i].life <= 0){
            sparkles.splice(i,1);
        }
    }

    // cinematic color grading
    ctx.fillStyle =
    "rgba(255,170,255,0.025)";
    ctx.fillRect(0,0,w,h);
}

resize();
animate();

</script>

</body>
</html>
