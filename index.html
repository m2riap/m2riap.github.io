<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dolphin Sparkle Background</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: crosshair;
    }

    #scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    /* Your background image */
    #bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        user-select: none;
        pointer-events: none;
    }

    canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
    }
</style>
</head>

<body>

<div id="scene">
    <!-- Replace image.jpg with your uploaded image filename -->
    <img id="bg" src="background.jpg" alt="Ocean Fantasy Background">

    <canvas id="sparkleCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("sparkleCanvas");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

const sparkles = [];

class Sparkle {
    constructor(x, y) {
        this.x = x;
        this.y = y;

        this.size = Math.random() * 4 + 1;
        this.life = 0;
        this.maxLife = Math.random() * 40 + 40;

        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = (Math.random() - 0.5) * 1.5;

        this.opacity = 1;

        this.color = `hsla(${180 + Math.random() * 80}, 100%, 80%,`;
    }

    update() {
        this.life++;

        this.x += this.vx;
        this.y += this.vy;

        this.opacity = 1 - this.life / this.maxLife;
    }

    draw() {
        ctx.save();

        ctx.translate(this.x, this.y);

        const glow = this.size * 4;

        // glow
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, glow);
        gradient.addColorStop(0, this.color + `${this.opacity})`);
        gradient.addColorStop(1, this.color + `0)`);

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, glow, 0, Math.PI * 2);
        ctx.fill();

        // star shape
        ctx.strokeStyle = `rgba(255,255,255,${this.opacity})`;
        ctx.lineWidth = 1.5;

        ctx.beginPath();
        ctx.moveTo(-this.size, 0);
        ctx.lineTo(this.size, 0);
        ctx.moveTo(0, -this.size);
        ctx.lineTo(0, this.size);
        ctx.stroke();

        ctx.restore();
    }
}

function createSparkles(x, y) {
    for (let i = 0; i < 5; i++) {
        sparkles.push(new Sparkle(x, y));
    }
}

window.addEventListener("mousemove", (e) => {
    createSparkles(e.clientX, e.clientY);
});

window.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];
    createSparkles(touch.clientX, touch.clientY);
});

function animate() {
    ctx.clearRect(0, 0, w, h);

    for (let i = sparkles.length - 1; i >= 0; i--) {
        const s = sparkles[i];

        s.update();
        s.draw();

        if (s.life >= s.maxLife) {
            sparkles.splice(i, 1);
        }
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
