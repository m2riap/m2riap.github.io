<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Realistic Sunset Sea</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
            radial-gradient(circle at center,
            transparent 45%,
            rgba(0,0,0,0.35) 100%);
        mix-blend-mode: multiply;
    }

    .grain {
        position: absolute;
        inset: 0;
        opacity: 0.04;
        pointer-events: none;
        background-image:
            repeating-radial-gradient(circle at 0 0,
            transparent 0,
            #fff 1px,
            transparent 2px);
    }

    .title {
        position: absolute;
        top: 40px;
        width: 100%;
        text-align: center;
        color: rgba(255,255,255,0.92);
        letter-spacing: 10px;
        font-size: 2rem;
        font-weight: 300;
        text-shadow:
            0 0 15px rgba(255,255,255,0.4),
            0 0 40px rgba(255,160,80,0.3);
        pointer-events: none;
    }
</style>
</head>

<body>

<div class="title">SUNSET SEA</div>
<div class="grain"></div>
<div class="vignette"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;
let time = 0;

const clouds = [];
const sparkles = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    generateClouds();
}

window.addEventListener("resize", resize);

class Cloud {
    constructor(x, y, scale, speed, opacity) {
        this.x = x;
        this.y = y;
        this.scale = scale;
        this.speed = speed;
        this.opacity = opacity;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.scale, this.scale);

        ctx.globalAlpha = this.opacity;

        for (let i = 0; i < 18; i++) {
            const offsetX = Math.sin(i * 1.3) * 80;
            const offsetY = Math.cos(i * 1.7) * 20;

            const grad = ctx.createRadialGradient(
                offsetX,
                offsetY,
                10,
                offsetX,
                offsetY,
                90
            );

            grad.addColorStop(0, "rgba(255,255,255,0.95)");
            grad.addColorStop(0.4, "rgba(255,230,220,0.75)");
            grad.addColorStop(1, "rgba(255,180,120,0)");

            ctx.fillStyle = grad;

            ctx.beginPath();
            ctx.arc(
                offsetX,
                offsetY,
                70 + Math.random() * 20,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        ctx.restore();

        this.x += this.speed;

        if (this.x > w + 300) {
            this.x = -300;
        }
    }
}

function generateClouds() {
    clouds.length = 0;

    for (let i = 0; i < 16; i++) {
        clouds.push(
            new Cloud(
                Math.random() * w,
                Math.random() * h * 0.45,
                0.7 + Math.random() * 1.3,
                0.05 + Math.random() * 0.12,
                0.12 + Math.random() * 0.15
            )
        );
    }
}

class Sparkle {
    constructor(x, y) {
        this.x = x;
        this.y = y;

        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;

        this.life = 1;
        this.size = 1 + Math.random() * 4;

        this.hue = 35 + Math.random() * 25;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.018;
    }

    draw() {
        ctx.save();

        ctx.globalAlpha = this.life;

        ctx.shadowBlur = 25;
        ctx.shadowColor = `hsla(${this.hue},100%,70%,1)`;

        ctx.fillStyle = `hsla(${this.hue},100%,75%,1)`;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}

window.addEventListener("mousemove", e => {
    for (let i = 0; i < 5; i++) {
        sparkles.push(
            new Sparkle(
                e.clientX + (Math.random() - 0.5) * 20,
                e.clientY + (Math.random() - 0.5) * 20
            )
        );
    }
});

function drawSky() {
    const sky = ctx.createLinearGradient(0, 0, 0, h);

    sky.addColorStop(0, "#081120");
    sky.addColorStop(0.2, "#243b6b");
    sky.addColorStop(0.45, "#ff8e61");
    sky.addColorStop(0.65, "#ffb784");
    sky.addColorStop(1, "#ffe0b8");

    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);
}

function drawSun() {
    const x = w / 2;
    const y = h * 0.58;

    const glow = ctx.createRadialGradient(
        x, y, 40,
        x, y, 250
    );

    glow.addColorStop(0, "rgba(255,250,220,1)");
    glow.addColorStop(0.2, "rgba(255,220,150,0.95)");
    glow.addColorStop(0.45, "rgba(255,160,90,0.45)");
    glow.addColorStop(1, "rgba(255,120,50,0)");

    ctx.fillStyle = glow;

    ctx.beginPath();
    ctx.arc(x, y, 250, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.fillStyle = "#fff5cf";
    ctx.arc(x, y, 60, 0, Math.PI * 2);
    ctx.fill();
}

function drawSea() {
    const horizon = h * 0.58;

    const sea = ctx.createLinearGradient(0, horizon, 0, h);

    sea.addColorStop(0, "#ff9966");
    sea.addColorStop(0.15, "#2f6b89");
    sea.addColorStop(0.5, "#123347");
    sea.addColorStop(1, "#061018");

    ctx.fillStyle = sea;
    ctx.fillRect(0, horizon, w, h);

    for (let y = horizon; y < h; y += 3) {
        ctx.beginPath();

        for (let x = 0; x < w; x += 10) {
            const wave =
                y +
                Math.sin(x * 0.018 + time * 2 + y * 0.015) * 4 +
                Math.sin(x * 0.006 + time) * 6;

            if (x === 0) ctx.moveTo(x, wave);
            else ctx.lineTo(x, wave);
        }

        ctx.strokeStyle = `rgba(255,255,255,${
            0.02 + ((y - horizon) / h) * 0.05
        })`;

        ctx.stroke();
    }

    // Reflection path
    const reflect = ctx.createLinearGradient(
        w / 2,
        horizon,
        w / 2,
        h
    );

    reflect.addColorStop(0, "rgba(255,240,180,0.6)");
    reflect.addColorStop(1, "rgba(255,240,180,0)");

    ctx.fillStyle = reflect;

    ctx.beginPath();
    ctx.moveTo(w / 2 - 40, horizon);
    ctx.lineTo(w / 2 + 40, horizon);
    ctx.lineTo(w / 2 + 250, h);
    ctx.lineTo(w / 2 - 250, h);
    ctx.closePath();

    ctx.fill();
}

function drawAtmosphere() {
    const haze = ctx.createLinearGradient(
        0,
        h * 0.4,
        0,
        h
    );

    haze.addColorStop(0, "rgba(255,200,150,0)");
    haze.addColorStop(1, "rgba(255,160,120,0.15)");

    ctx.fillStyle = haze;
    ctx.fillRect(0, 0, w, h);
}

function animate() {
    requestAnimationFrame(animate);

    time += 0.003;

    drawSky();
    drawSun();

    clouds.forEach(cloud => cloud.draw());

    drawSea();
    drawAtmosphere();

    for (let i = sparkles.length - 1; i >= 0; i--) {
        sparkles[i].update();
        sparkles[i].draw();

        if (sparkles[i].life <= 0) {
            sparkles.splice(i, 1);
        }
    }

    // cinematic warmth
    ctx.fillStyle = "rgba(255,120,60,0.025)";
    ctx.fillRect(0, 0, w, h);
}

resize();
animate();
</script>

</body>
</html>
