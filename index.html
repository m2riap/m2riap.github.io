<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Magical Dolphin Paradise</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    cursor:crosshair;
    font-family:sans-serif;
}

#scene{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* BACKGROUND IMAGE */
#bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
    pointer-events:none;
}

/* DOLPHIN LAYER */
#dolphinLayer{
    position:absolute;
    inset:0;
    z-index:2;
    overflow:hidden;
    pointer-events:none;
}

/* SPARKLES */
canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:3;
    pointer-events:none;
}

/* REALISTIC DOLPHINS */
.dolphin{
    position:absolute;
    width:220px;
    opacity:0.95;
    filter:
        drop-shadow(0 0 10px rgba(255,255,255,0.6))
        drop-shadow(0 0 30px rgba(0,255,255,0.35));
    animation-timing-function:linear;
    animation-iteration-count:infinite;
}

/* DIFFERENT JUMP PATHS */

.jump1{
    top:55%;
    animation:jump1 14s infinite;
}

.jump2{
    top:35%;
    animation:jump2 18s infinite;
}

.jump3{
    top:65%;
    animation:jump3 16s infinite;
}

.jump4{
    top:20%;
    animation:jump4 22s infinite;
}

.jump5{
    top:50%;
    animation:jump5 20s infinite;
}

/* JUMPING MOTION */

@keyframes jump1{

    0%{
        transform:
            translateX(-300px)
            translateY(100px)
            rotate(10deg)
            scale(0.9);
    }

    20%{
        transform:
            translateX(20vw)
            translateY(-120px)
            rotate(-20deg)
            scale(1);
    }

    40%{
        transform:
            translateX(40vw)
            translateY(-260px)
            rotate(-40deg)
            scale(1.1);
    }

    60%{
        transform:
            translateX(60vw)
            translateY(-100px)
            rotate(-10deg)
            scale(1);
    }

    100%{
        transform:
            translateX(120vw)
            translateY(120px)
            rotate(15deg)
            scale(0.9);
    }
}

@keyframes jump2{

    0%{
        transform:
            translateX(-250px)
            translateY(120px)
            rotate(15deg);
    }

    30%{
        transform:
            translateX(35vw)
            translateY(-220px)
            rotate(-30deg)
            scale(1.15);
    }

    55%{
        transform:
            translateX(55vw)
            translateY(-320px)
            rotate(-45deg)
            scale(1.2);
    }

    100%{
        transform:
            translateX(120vw)
            translateY(150px)
            rotate(20deg);
    }
}

@keyframes jump3{

    0%{
        transform:
            translateX(-350px)
            translateY(150px)
            rotate(10deg);
    }

    25%{
        transform:
            translateX(30vw)
            translateY(-100px)
            rotate(-10deg);
    }

    50%{
        transform:
            translateX(50vw)
            translateY(-220px)
            rotate(-35deg)
            scale(1.15);
    }

    100%{
        transform:
            translateX(120vw)
            translateY(180px)
            rotate(15deg);
    }
}

@keyframes jump4{

    0%{
        transform:
            translateX(-250px)
            translateY(80px)
            rotate(5deg)
            scale(0.8);
    }

    50%{
        transform:
            translateX(50vw)
            translateY(-250px)
            rotate(-45deg)
            scale(1.25);
    }

    100%{
        transform:
            translateX(120vw)
            translateY(100px)
            rotate(10deg)
            scale(0.8);
    }
}

@keyframes jump5{

    0%{
        transform:
            translateX(-300px)
            translateY(120px)
            rotate(20deg);
    }

    35%{
        transform:
            translateX(40vw)
            translateY(-180px)
            rotate(-25deg)
            scale(1.1);
    }

    60%{
        transform:
            translateX(65vw)
            translateY(-280px)
            rotate(-50deg)
            scale(1.25);
    }

    100%{
        transform:
            translateX(120vw)
            translateY(150px)
            rotate(15deg);
    }
}

</style>
</head>

<body>

<div id="scene">

    <!-- YOUR BACKGROUND -->
    <img id="bg" src="background.jpg" alt="Fantasy Ocean">

    <!-- DOLPHINS -->
    <div id="dolphinLayer">

        <!-- Use your own transparent dolphin PNGs -->
        <!-- Replace dolphin.png with your file -->

        <img src="https://pngimg.com/d/dolphin_PNG713.png"
             class="dolphin jump1"
             style="width:300px; animation-delay:-2s;">

        <img src="https://pngimg.com/d/dolphin_PNG713.png"
             class="dolphin jump2"
             style="width:260px; animation-delay:-7s;">

        <img src="https://pngimg.com/d/dolphin_PNG713.png"
             class="dolphin jump3"
             style="width:240px; animation-delay:-11s;">

        <img src="https://pngimg.com/d/dolphin_PNG713.png"
             class="dolphin jump4"
             style="width:340px; animation-delay:-4s;">

        <img src="https://pngimg.com/d/dolphin_PNG713.png"
             class="dolphin jump5"
             style="width:280px; animation-delay:-14s;">

        <img src="https://pngimg.com/d/dolphin_PNG713.png"
             class="dolphin jump1"
             style="width:220px; animation-delay:-9s; top:70%;">

        <img src="https://pngimg.com/d/dolphin_PNG713.png"
             class="dolphin jump2"
             style="width:370px; animation-delay:-18s; top:8%;">

    </div>

    <!-- SPARKLES -->
    <canvas id="sparkleCanvas"></canvas>

</div>

<script>

const canvas = document.getElementById("sparkleCanvas");
const ctx = canvas.getContext("2d");

let width;
let height;

function resizeCanvas(){

    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

/* SPARKLES */

const sparkles = [];

class Sparkle{

    constructor(x,y){

        this.x = x;
        this.y = y;

        this.size = Math.random() * 4 + 1;

        this.life = 0;
        this.maxLife = Math.random() * 50 + 40;

        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;

        this.opacity = 1;

        this.hue = 180 + Math.random() * 80;
    }

    update(){

        this.life++;

        this.x += this.vx;
        this.y += this.vy;

        this.opacity = 1 - this.life / this.maxLife;
    }

    draw(){

        ctx.save();

        ctx.translate(this.x,this.y);

        /* GLOW */
        const gradient = ctx.createRadialGradient(
            0,0,0,
            0,0,this.size * 6
        );

        gradient.addColorStop(
            0,
            `hsla(${this.hue},100%,80%,${this.opacity})`
        );

        gradient.addColorStop(
            1,
            `hsla(${this.hue},100%,80%,0)`
        );

        ctx.fillStyle = gradient;

        ctx.beginPath();
        ctx.arc(0,0,this.size * 6,0,Math.PI*2);
        ctx.fill();

        /* STAR */
        ctx.strokeStyle = `rgba(255,255,255,${this.opacity})`;
        ctx.lineWidth = 1.5;

        ctx.beginPath();

        ctx.moveTo(-this.size,0);
        ctx.lineTo(this.size,0);

        ctx.moveTo(0,-this.size);
        ctx.lineTo(0,this.size);

        ctx.stroke();

        ctx.restore();
    }
}

/* CREATE SPARKLES */

function createSparkles(x,y){

    for(let i=0;i<6;i++){

        sparkles.push(new Sparkle(x,y));
    }
}

/* MOUSE */

window.addEventListener("mousemove",(e)=>{

    createSparkles(e.clientX,e.clientY);
});

/* TOUCH */

window.addEventListener("touchmove",(e)=>{

    const touch = e.touches[0];

    createSparkles(touch.clientX,touch.clientY);
});

/* ANIMATION LOOP */

function animate(){

    ctx.clearRect(0,0,width,height);

    for(let i=sparkles.length-1;i>=0;i--){

        const sparkle = sparkles[i];

        sparkle.update();
        sparkle.draw();

        if(sparkle.life >= sparkle.maxLife){

            sparkles.splice(i,1);
        }
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
