<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultra Realistic Y2K Ocean</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}

.overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
    radial-gradient(circle at center,
    rgba(255,255,255,0.02),
    rgba(0,0,0,0.22));
}

.film-grain{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:0.025;
    mix-blend-mode:soft-light;
    background-image:
    repeating-radial-gradient(circle at 0 0,
    rgba(255,255,255,0.4) 0px,
    transparent 2px);
}
</style>
</head>

<body>

<div class="overlay"></div>
<div class="film-grain"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;
let time = 0;

const sparkles = [];

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

window.addEventListener("resize", resize);

class Sparkle{

    constructor(x,y){

        this.x = x;
        this.y = y;

        this.vx = (Math.random()-0.5)*2;
        this.vy = (Math.random()-0.5)*2;

        this.life = 1;

        this.size = 1 + Math.random()*2.5;

        this.hue = 280 + Math.random()*60;
    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.life -= 0.018;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha = this.life;

        ctx.shadowBlur = 18;
        ctx.shadowColor =
        `hsla(${this.hue},100%,75%,1)`;

        ctx.fillStyle =
        `hsla(${this.hue},100%,80%,1)`;

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

window.addEventListener("mousemove",(e)=>{

    for(let i=0;i<5;i++){

        sparkles.push(
            new Sparkle(
                e.clientX + (Math.random()-0.5)*18,
                e.clientY + (Math.random()-0.5)*18
            )
        );
    }
});

function drawSky(){

    // cinematic y2k sky
    const sky = ctx.createLinearGradient(
        0,0,
        0,h
    );

    sky.addColorStop(0,"#10228f");
    sky.addColorStop(0.18,"#4663ff");
    sky.addColorStop(0.42,"#ff61da");
    sky.addColorStop(0.62,"#ff9cdd");
    sky.addColorStop(0.82,"#89dcff");
    sky.addColorStop(1,"#fff2ff");

    ctx.fillStyle = sky;
    ctx.fillRect(0,0,w,h);

    // atmospheric glow
    const atmosphere = ctx.createRadialGradient(
        w/2,h*0.52,100,
        w/2,h*0.52,w*0.8
    );

    atmosphere.addColorStop(0,
        "rgba(255,180,255,0.18)");

    atmosphere.addColorStop(1,
        "rgba(255,180,255,0)");

    ctx.fillStyle = atmosphere;
    ctx.fillRect(0,0,w,h);
}

function drawSun(){

    const x = w/2;
    const y = h*0.56;

    const glow = ctx.createRadialGradient(
        x,y,70,
        x,y,420
    );

    glow.addColorStop(0,
        "rgba(255,255,255,1)");

    glow.addColorStop(0.18,
        "rgba(255,245,255,0.96)");

    glow.addColorStop(0.42,
        "rgba(255,170,240,0.5)");

    glow.addColorStop(1,
        "rgba(255,150,220,0)");

    ctx.fillStyle = glow;

    ctx.beginPath();
    ctx.arc(x,y,420,0,Math.PI*2);
    ctx.fill();

    // bright core
    ctx.beginPath();
    ctx.fillStyle = "#ffffff";
    ctx.arc(x,y,85,0,Math.PI*2);
    ctx.fill();
}

function drawSea(){

    const horizon = h*0.56;

    const sea = ctx.createLinearGradient(
        0,horizon,
        0,h
    );

    sea.addColorStop(0,"#ff82df");
    sea.addColorStop(0.12,"#6fd8ff");
    sea.addColorStop(0.38,"#3472e0");
    sea.addColorStop(1,"#081a4d");

    ctx.fillStyle = sea;
    ctx.fillRect(0,horizon,w,h);

    // ultra detailed layered waves
    for(let y=horizon; y<h; y+=1.5){

        ctx.beginPath();

        for(let x=0; x<w; x+=3){

            const wave =
                y +

                Math.sin(x*0.008 + time*1.4 + y*0.012)*8 +

                Math.sin(x*0.025 + time*2.5)*4 +

                Math.sin(x*0.07 + time*5)*1.5 +

                Math.sin(x*0.13 + time*8)*0.6;

            if(x===0){
                ctx.moveTo(x,wave);
            }else{
                ctx.lineTo(x,wave);
            }
        }

        const alpha =
            0.025 + ((y-horizon)/h)*0.08;

        ctx.strokeStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.lineWidth = 1;

        ctx.stroke();
    }

    // realistic shimmering reflection
    const reflection = ctx.createLinearGradient(
        w/2,horizon,
        w/2,h
    );

    reflection.addColorStop(0,
        "rgba(255,230,255,0.95)");

    reflection.addColorStop(0.25,
        "rgba(255,210,255,0.45)");

    reflection.addColorStop(1,
        "rgba(255,200,255,0)");

    ctx.fillStyle = reflection;

    ctx.beginPath();

    ctx.moveTo(w/2 - 80,horizon);
    ctx.lineTo(w/2 + 80,horizon);

    ctx.lineTo(w/2 + 360,h);
    ctx.lineTo(w/2 - 360,h);

    ctx.closePath();
    ctx.fill();

    // sparkle highlights on water
    for(let i=0;i<140;i++){

        const px = Math.random()*w;
        const py = horizon + Math.random()*(h-horizon);

        const brightness =
            Math.random()*0.12;

        ctx.fillStyle =
            `rgba(255,255,255,${brightness})`;

        ctx.fillRect(px,py,1.5,1.5);
    }
}

function drawAtmosphere(){

    const haze = ctx.createLinearGradient(
        0,h*0.4,
        0,h
    );

    haze.addColorStop(0,
        "rgba(255,170,255,0)");

    haze.addColorStop(1,
        "rgba(255,140,255,0.06)");

    ctx.fillStyle = haze;
    ctx.fillRect(0,0,w,h);
}

function animate(){

    requestAnimationFrame(animate);

    time += 0.0035;

    drawSky();

    drawSun();

    drawSea();

    drawAtmosphere();

    // mouse sparkles
    for(let i=sparkles.length-1;i>=0;i--){

        sparkles[i].update();
        sparkles[i].draw();

        if(sparkles[i].life <= 0){
            sparkles.splice(i,1);
        }
    }

    // cinematic color grading
    ctx.fillStyle =
    "rgba(255,180,255,0.018)";
    ctx.fillRect(0,0,w,h);
}

resize();
animate();

</script>

</body>
</html>
