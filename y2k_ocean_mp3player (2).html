<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ultra Realistic Y2K Ocean</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Trebuchet MS',sans-serif;}
canvas{display:block;}
#oceanCanvas{position:absolute;inset:0;}
.overlay{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at center,rgba(255,255,255,0.02),rgba(0,0,0,0.22));}
.film-grain{position:absolute;inset:0;pointer-events:none;opacity:0.025;mix-blend-mode:soft-light;background-image:repeating-radial-gradient(circle at 0 0,rgba(255,255,255,0.4) 0px,transparent 2px);}

#player{
  position:absolute;
  width:280px;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  filter:
    drop-shadow(0 22px 44px rgba(255,100,200,0.65))
    drop-shadow(0 6px 16px rgba(180,50,140,0.55));
  animation:floatAnim 4s ease-in-out infinite;
}
#player:active{cursor:grabbing;animation:none;}
@keyframes floatAnim{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-12px);}
}

/* Heart canvas — sprite with transparent bg */
#heartCanvas{display:block;width:100%;pointer-events:none;}

/* Circular screen — sits inside the heart hole, fully transparent */
#screen{
  position:absolute;
  border-radius:50%;
  background:transparent;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  pointer-events:none;
}

/* Spinning disc when playing */
.track-art{
  width:52%;height:52%;
  border-radius:50%;
  background:conic-gradient(#ff61da,#b44fff,#4663ff,#89dcff,#ff61da);
  flex-shrink:0;
  box-shadow:0 0 14px rgba(255,100,210,0.7);
  animation:spin 3s linear infinite;
  transition:opacity 0.3s;
}
.track-art.paused{animation-play-state:paused;opacity:0.6;}
@keyframes spin{to{transform:rotate(360deg);}}

.track-title{
  color:#fff;
  font-size:8.5px;
  font-weight:700;
  letter-spacing:0.4px;
  text-transform:uppercase;
  text-shadow:0 0 10px rgba(255,150,220,1),0 0 4px #000;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:90%;margin-top:4px;line-height:1.2;
}
.track-artist{
  color:#89dcff;
  font-size:7px;
  letter-spacing:0.3px;
  text-shadow:0 0 8px rgba(100,200,255,0.9),0 0 3px #000;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:90%;margin-top:1px;
}
.track-time{
  color:rgba(255,220,255,0.85);
  font-size:6.5px;
  margin-top:3px;
  font-variant-numeric:tabular-nums;
  letter-spacing:0.5px;
  text-shadow:0 0 5px rgba(255,150,220,0.8);
}

/* Invisible hit buttons on top of everything */
.ctrl-btn{
  position:absolute;
  background:transparent;
  border:none;
  cursor:pointer;
  border-radius:50%;
  outline:none;
  -webkit-tap-highlight-color:transparent;
  z-index:10;
}
.ctrl-btn:active{opacity:0.5;}
</style>
</head>
<body>

<canvas id="oceanCanvas"></canvas>
<div class="overlay"></div>
<div class="film-grain"></div>

<div id="player">
  <!-- Heart sprite: black bg removed via pixel manipulation -->
  <canvas id="heartCanvas"></canvas>

  <!-- Transparent circular screen inside the hole -->
  <div id="screen">
    <div class="track-art" id="trackArt"></div>
    <div class="track-title"  id="trackTitle">Lush Life</div>
    <div class="track-artist" id="trackArtist">Zara Larsson</div>
    <div class="track-time"   id="trackTime">0:00 / 3:29</div>
  </div>

  <!-- Buttons positioned exactly over PNG control icons -->
  <!-- Play/Pause = centre heart icon on wheel -->
  <button class="ctrl-btn" id="btn-play"  aria-label="Play / Pause"></button>
  <!-- Prev = left arrow on wheel -->
  <button class="ctrl-btn" id="btn-prev"  aria-label="Previous"></button>
  <!-- Next = right arrow on wheel -->
  <button class="ctrl-btn" id="btn-next"  aria-label="Next"></button>
  <!-- Vol down = bottom pause/down on wheel -->
  <button class="ctrl-btn" id="btn-voldown" aria-label="Volume down"></button>
  <!-- Menu = dot at top of wheel -->
  <button class="ctrl-btn" id="btn-menu"  aria-label="Menu"></button>
</div>

<script>
// ─── OCEAN ──────────────────────────────────────────────────────────
const oc   = document.getElementById('oceanCanvas');
const octx = oc.getContext('2d');
let W,H,time=0;
const sparkles=[];

function resizeOcean(){
  W=oc.width=window.innerWidth;
  H=oc.height=window.innerHeight;
}
window.addEventListener('resize',resizeOcean);

class Sparkle{
  constructor(x,y){this.x=x;this.y=y;this.vx=(Math.random()-.5)*2;this.vy=(Math.random()-.5)*2;this.life=1;this.size=1+Math.random()*2.5;this.hue=280+Math.random()*60;}
  update(){this.x+=this.vx;this.y+=this.vy;this.life-=0.018;}
  draw(){octx.save();octx.globalAlpha=this.life;octx.shadowBlur=18;octx.shadowColor=`hsla(${this.hue},100%,75%,1)`;octx.fillStyle=`hsla(${this.hue},100%,80%,1)`;octx.beginPath();octx.arc(this.x,this.y,this.size,0,Math.PI*2);octx.fill();octx.restore();}
}
window.addEventListener('mousemove',e=>{for(let i=0;i<5;i++)sparkles.push(new Sparkle(e.clientX+(Math.random()-.5)*18,e.clientY+(Math.random()-.5)*18));});

function drawSky(){
  const g=octx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#10228f');g.addColorStop(.18,'#4663ff');g.addColorStop(.42,'#ff61da');
  g.addColorStop(.62,'#ff9cdd');g.addColorStop(.82,'#89dcff');g.addColorStop(1,'#fff2ff');
  octx.fillStyle=g;octx.fillRect(0,0,W,H);
  const a=octx.createRadialGradient(W/2,H*.52,100,W/2,H*.52,W*.8);
  a.addColorStop(0,'rgba(255,180,255,.18)');a.addColorStop(1,'rgba(255,180,255,0)');
  octx.fillStyle=a;octx.fillRect(0,0,W,H);
}
function drawSun(){
  const x=W/2,y=H*.56;
  const g=octx.createRadialGradient(x,y,70,x,y,420);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.18,'rgba(255,245,255,.96)');
  g.addColorStop(.42,'rgba(255,170,240,.5)');g.addColorStop(1,'rgba(255,150,220,0)');
  octx.fillStyle=g;octx.beginPath();octx.arc(x,y,420,0,Math.PI*2);octx.fill();
  octx.beginPath();octx.fillStyle='#fff';octx.arc(x,y,85,0,Math.PI*2);octx.fill();
}
function drawSea(){
  const hz=H*.56;
  const g=octx.createLinearGradient(0,hz,0,H);
  g.addColorStop(0,'#ff82df');g.addColorStop(.12,'#6fd8ff');g.addColorStop(.38,'#3472e0');g.addColorStop(1,'#081a4d');
  octx.fillStyle=g;octx.fillRect(0,hz,W,H);
  for(let y=hz;y<H;y+=1.5){
    octx.beginPath();
    for(let x=0;x<W;x+=3){
      const wv=y+Math.sin(x*.008+time*1.4+y*.012)*8+Math.sin(x*.025+time*2.5)*4+Math.sin(x*.07+time*5)*1.5+Math.sin(x*.13+time*8)*.6;
      x===0?octx.moveTo(x,wv):octx.lineTo(x,wv);
    }
    octx.strokeStyle=`rgba(255,255,255,${.025+((y-hz)/H)*.08})`;octx.lineWidth=1;octx.stroke();
  }
  const r=octx.createLinearGradient(W/2,hz,W/2,H);
  r.addColorStop(0,'rgba(255,230,255,.95)');r.addColorStop(.25,'rgba(255,210,255,.45)');r.addColorStop(1,'rgba(255,200,255,0)');
  octx.fillStyle=r;octx.beginPath();octx.moveTo(W/2-80,hz);octx.lineTo(W/2+80,hz);octx.lineTo(W/2+360,H);octx.lineTo(W/2-360,H);octx.closePath();octx.fill();
  for(let i=0;i<140;i++){octx.fillStyle=`rgba(255,255,255,${Math.random()*.12})`;octx.fillRect(Math.random()*W,hz+Math.random()*(H-hz),1.5,1.5);}
}
function drawAtmosphere(){
  const g=octx.createLinearGradient(0,H*.4,0,H);
  g.addColorStop(0,'rgba(255,170,255,0)');g.addColorStop(1,'rgba(255,140,255,.06)');
  octx.fillStyle=g;octx.fillRect(0,0,W,H);
}

rawImg.onload = function(){
  const iw=rawImg.naturalWidth, ih=rawImg.naturalHeight;
  const off=document.createElement('canvas');
  off.width=iw;off.height=ih;
  const o=off.getContext('2d');
  o.drawImage(rawImg,0,0);
  const id=o.getImageData(0,0,iw,ih);
  const d=id.data;
  // Remove black background with smooth edge
  for(let i=0;i<d.length;i+=4){
    const br=(d[i]+d[i+1]+d[i+2])/3;
    if(br<28)d[i+3]=0;
    else if(br<75)d[i+3]=Math.round(((br-28)/47)*255);
  }
  o.putImageData(id,0,0);
  sprite=off;
  // Draw into visible heart canvas at natural size
  hCanvas.width=iw;hCanvas.height=ih;
  hCtx.drawImage(sprite,0,0);
  layoutPlayer();
};

// ─── LAYOUT ─────────────────────────────────────────────────────────
const PW=280; // player CSS width px
const PH=PW*IMG_ASPECT;

function layoutPlayer(){
  // Screen: perfectly fills the heart hole
  const scr=document.getElementById('screen');
  const sd = PW*HOLE_NR*2;           // diameter
  const sl = PW*HOLE_NCX - sd/2;     // left
  const st = PH*HOLE_NCY - sd/2;     // top  (use PH for Y axis)
  scr.style.cssText=`position:absolute;border-radius:50%;background:transparent;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;width:${sd}px;height:${sd}px;left:${sl}px;top:${st}px;`;

  // Wheel buttons
  // centre of wheel in px inside player div
  const wcx = PW*WHL_NCX;
  const wcy = PH*WHL_NCY;
  const wr  = PW*WHL_NR;            // wheel radius in px

  // play/pause — centre heart icon (inner circle)
  posBtn('btn-play',    wcx,         wcy,          wr*0.30);
  // prev — left arrow
  posBtn('btn-prev',    wcx-wr*0.63, wcy,          wr*0.22);
  // next — right arrow
  posBtn('btn-next',    wcx+wr*0.63, wcy,          wr*0.22);
  // vol down — bottom pause marks
  posBtn('btn-voldown', wcx,         wcy+wr*0.63,  wr*0.22);
  // menu — top dot
  posBtn('btn-menu',    wcx,         wcy-wr*0.63,  wr*0.22);
}

function posBtn(id,cx,cy,r){
  const b=document.getElementById(id);
  b.style.left  =(cx-r)+'px';
  b.style.top   =(cy-r)+'px';
  b.style.width =(r*2)+'px';
  b.style.height=(r*2)+'px';
}

// ─── TRACKS ─────────────────────────────────────────────────────────
const tracks=[
  {title:'Lush Life',   artist:'Zara Larsson', dur:209},
  {title:'Never Forget You', artist:'Zara Larsson', dur:207},
  {title:'Symphony',    artist:'Clean Bandit ft. Zara Larsson', dur:214},
  {title:'Ruin My Life',artist:'Zara Larsson', dur:192},
  {title:'She\'s Not Me', artist:'Zara Larsson',dur:176},
];
let cur=0, playing=false, elapsed=0, lastTs=null;

function fmt(s){const m=Math.floor(s/60);return `${m}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

function updateScreen(){
  const t=tracks[cur];
  document.getElementById('trackTitle').textContent =t.title;
  document.getElementById('trackArtist').textContent=t.artist;
  document.getElementById('trackTime').textContent  =`${fmt(elapsed)} / ${fmt(t.dur)}`;
  document.getElementById('trackArt').className='track-art'+(playing?'':' paused');
}

function tick(now){
  if(playing&&lastTs!==null){
    elapsed+=(now-lastTs)/1000;
    if(elapsed>=tracks[cur].dur){elapsed=0;cur=(cur+1)%tracks.length;}
  }
  lastTs=now;
}

// ─── AUDIO (YouTube embed approach for Lush Life) ───────────────────
// We use a hidden iframe that plays/pauses via postMessage YT API
let ytReady=false, ytPlayer=null;
const ytFrame=document.createElement('iframe');
ytFrame.id='ytFrame';
ytFrame.style.cssText='position:fixed;width:0;height:0;border:none;pointer-events:none;';
// Lush Life official audio: videoId = oJRsl3ZPt18
ytFrame.src='https://www.youtube.com/embed/oJRsl3ZPt18?enablejsapi=1&autoplay=0&controls=0&origin='+location.origin;
ytFrame.allow='autoplay';
document.body.appendChild(ytFrame);

window.addEventListener('message',e=>{
  try{
    const d=typeof e.data==='string'?JSON.parse(e.data):e.data;
    if(d.event==='onReady')ytReady=true;
    if(d.event==='infoDelivery'&&d.info){
      if(typeof d.info.currentTime==='number')elapsed=d.info.currentTime;
    }
  }catch(_){}
});

function ytCmd(func,args){
  ytFrame.contentWindow.postMessage(JSON.stringify({event:'command',func,args:args||[]}),'*');
}

// ─── BUTTON ACTIONS ──────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click',()=>{
  playing=!playing;
  lastTs=null;
  if(ytReady){
    playing ? ytCmd('playVideo') : ytCmd('pauseVideo');
  }
  updateScreen();
});
document.getElementById('btn-prev').addEventListener('click',()=>{
  elapsed=0;cur=(cur-1+tracks.length)%tracks.length;
  if(ytReady&&playing)ytCmd('stopVideo');
  playing=false;lastTs=null;
  updateScreen();
});
document.getElementById('btn-next').addEventListener('click',()=>{
  elapsed=0;cur=(cur+1)%tracks.length;
  if(ytReady&&playing)ytCmd('stopVideo');
  playing=false;lastTs=null;
  updateScreen();
});
document.getElementById('btn-voldown').addEventListener('click',()=>{
  ytCmd('setVolume',[Math.max(0,(window._vol||80)-15)]);
  window._vol=Math.max(0,(window._vol||80)-15);
});
document.getElementById('btn-menu').addEventListener('click',()=>{
  ytCmd('setVolume',[Math.min(100,(window._vol||80)+15)]);
  window._vol=Math.min(100,(window._vol||80)+15);
});

// ─── DRAG ────────────────────────────────────────────────────────────
const player=document.getElementById('player');
let dragging=false,dox=0,doy=0,dpx=0,dpy=0;

function initPos(){
  dpx=(window.innerWidth -PW)/2;
  dpy=(window.innerHeight-PH)/2-window.innerHeight*.04;
  player.style.left=dpx+'px';player.style.top=dpy+'px';
}

player.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('ctrl-btn'))return;
  dragging=true;dox=e.clientX-dpx;doy=e.clientY-dpy;
  player.style.animation='none';e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  dpx=e.clientX-dox;dpy=e.clientY-doy;
  player.style.left=dpx+'px';player.style.top=dpy+'px';
});
window.addEventListener('mouseup',()=>{
  if(dragging){dragging=false;player.style.animation='floatAnim 4s ease-in-out infinite';}
});
player.addEventListener('touchstart',e=>{
  if(e.target.classList.contains('ctrl-btn'))return;
  dragging=true;const t=e.touches[0];dox=t.clientX-dpx;doy=t.clientY-dpy;
  player.style.animation='none';e.preventDefault();
},{passive:false});
window.addEventListener('touchmove',e=>{
  if(!dragging)return;
  const t=e.touches[0];dpx=t.clientX-dox;dpy=t.clientY-doy;
  player.style.left=dpx+'px';player.style.top=dpy+'px';e.preventDefault();
},{passive:false});
window.addEventListener('touchend',()=>{
  if(dragging){dragging=false;player.style.animation='floatAnim 4s ease-in-out infinite';}
});

// ─── MAIN LOOP ───────────────────────────────────────────────────────
function loop(now){
  requestAnimationFrame(loop);
  time+=0.0035;
  resizeOcean();
  drawSky();drawSun();drawSea();drawAtmosphere();
  octx.fillStyle='rgba(255,180,255,0.018)';octx.fillRect(0,0,W,H);
  for(let i=sparkles.length-1;i>=0;i--){
    sparkles[i].update();sparkles[i].draw();
    if(sparkles[i].life<=0)sparkles.splice(i,1);
  }
  tick(now);
  updateScreen();
}

resizeOcean();
initPos();
updateScreen();
requestAnimationFrame(loop);
</script>
